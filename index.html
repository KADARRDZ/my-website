<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف المطور بيرلس</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --main-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-1: #0f172a;
            --bg-2: #1e1b4b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            transition: 0.3s; 
        }

        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            direction: rtl; 
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--main-color), var(--secondary-color));
            padding: 3px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .avatar i {
            width: 100%;
            height: 100%;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: var(--main-color);
        }

        h1 { 
            font-size: 28px; 
            margin-bottom: 5px; 
            background: linear-gradient(45deg, #fff, var(--main-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .job-title {
            font-size: 16px;
            color: var(--main-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            text-decoration: none;
        }

        .social-links a:hover {
            background: linear-gradient(45deg, var(--main-color), var(--secondary-color));
            transform: translateY(-3px);
        }

        .secret-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            margin-top: 30px;
            font-size: 13px;
        }

        .secret-btn:hover { 
            color: var(--main-color); 
        }

        .admin-panel { 
            margin-top: 20px; 
            background: #111827; 
            border: 1px solid #374151;
            padding: 20px; 
            border-radius: 15px; 
            max-width: 450px;
            width: 100%;
            display: none;
        }

        .admin-panel h3 { 
            margin-bottom: 12px; 
            color: var(--main-color); 
            font-size: 18px;
        }

        .grid-inputs { 
            display: flex; 
            gap: 10px; 
        }

        .grid-inputs div { 
            flex: 1; 
        }

        label { 
            display: block; 
            text-align: right; 
            font-size: 12px; 
            color: #94a3b8; 
            margin-top: 8px; 
        }

        input, textarea { 
            display: block; 
            width: 100%; 
            margin-top: 4px;
            padding: 8px; 
            font-size: 13px; 
            border-radius: 6px; 
            border: 1px solid #374151; 
            background: #1f2937;
            color: white;
        }

        input[type="color"] { 
            height: 35px; 
            padding: 2px; 
            cursor: pointer; 
        }
        
        .save-btn { 
            display: block; 
            width: 100%; 
            margin-top: 15px; 
            padding: 10px; 
            font-size: 15px; 
            border-radius: 6px; 
            border: none; 
            background: linear-gradient(45deg, #10b981, #059669);
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <!-- الواجهة التي يراها الزوار -->
    <div class="profile-card">
        <div class="avatar">
            <i class="fa-solid fa-code"></i>
        </div>
        <h1 id="v-name">بيرلس | Perles</h1>
        <div class="job-title" id="v-title">مطور ويب متكامل</div>
        <p class="bio" id="v-bio">مرحباً بك في موقعي الشخصي للتطوير البرمجي.</p>
        
        <div class="social-links">
            <a href="#" id="v-gh" target="_blank"><i class="fa-brands fa-github"></i></a>
            <a href="#" id="v-tw" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>

    <!-- زر الإعدادات السري -->
    <button class="secret-btn" onclick="toggleBox()"><i class="fa-solid fa-gear"></i> إعدادات الموقع</button>

    <!-- لوحة التحكم المخفية -->
    <div class="admin-panel" id="adminBox">
        <h3>🛠️ لوحة التحكم</h3>
        
        <label>الاسم الجديد:</label>
        <input type="text" id="i-name" placeholder="الاسم...">

        <label>المسمى الوظيفي:</label>
        <input type="text" id="i-title" placeholder="التخصص...">

        <label>الوصف:</label>
        <textarea id="i-bio" rows="2" placeholder="نبذة قصيرة..."></textarea>

        <div class="grid-inputs">
            <div>
                <label>رابط GitHub:</label>
                <input type="text" id="i-gh" placeholder="https://...">
            </div>
            <div>
                <label>رابط Twitter:</label>
                <input type="text" id="i-tw" placeholder="https://...">
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>اللون 1:</label>
                <input type="color" id="i-c1" value="#00f2fe">
            </div>
            <div>
                <label>اللون 2:</label>
                <input type="color" id="i-c2" value="#4facfe">
            </div>
        </div>

        <button class="save-btn" onclick="saveData()">💾 حفظ التعديلات</button>
    </div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // إعدادات مشروع Firebase الخاص بك SITEWEB 02
        const firebaseConfig = {
            apiKey: "AIzaSyBWmp2i3T00yxGhUBvDsXPUF-ARg9jCFGI",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "siteweb-02",
            storageBucket: "siteweb-02.firebasestorage.app",
            messagingSenderId: "351318877707",
            appId: "1:351318877707:web:51a4afde2adf82834e090e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('portfolioData');

        // قراءة وتطبيق البيانات فوراُ
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('v-name').innerText = data.name || "بيرلس";
                document.getElementById('v-title').innerText = data.title || "مطور";
                document.getElementById('v-bio').innerText = data.bio || "";
                document.getElementById('v-gh').href = data.github || "#";
                document.getElementById('v-tw').href = data.twitter || "#";
                
                document.documentElement.style.setProperty('--main-color', data.color1 || '#00f2fe');
                document.documentElement.style.setProperty('--secondary-color', data.color2 || '#4facfe');
            }
        });

        // حفظ البيانات
        function saveData() {
            const name = document.getElementById('i-name').value;
            const title = document.getElementById('i-title').value;
            const bio = document.getElementById('i-bio').value;
            const github = document.getElementById('i-gh').value;
            const twitter = document.getElementById('i-tw').value;
            const color1 = document.getElementById('i-c1').value;
            const color2 = document.getElementById('i-c2').value;

            if (name.trim() === "" || title.trim() === "") {
                alert("اكتب الاسم والتخصص أولاً!");
                return;
            }

            db.set({
                name: name, title: title, bio: bio,
                github: github, twitter: twitter,
                color1: color1, color2: color2
            }).then(() => {
                alert("✅ تم التعديل!");
            }).catch((e) => {
                alert("خطأ: " + e.message);
            });
        }

        // إظهار اللوحة المخفية
        function toggleBox() {
            const box = document.getElementById('adminBox');
            box.style.display = (box.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
